<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded square background #2563EB -->
  <rect width="32" height="32" rx="7" fill="#2563EB"/>

  <!--
    Wifi signal: 3 concentric arcs + dot
    All arcs share center (16, 25).
    Each arc spans 120° (60° each side of vertical),
    calculated as: endpoint = (16 ± R·sin60°, 25 − R·cos60°)
    sweep-flag=1 (clockwise over the top), large-arc-flag=0 (short arc).

    R=15 → endpoints (3.01, 17.5)  and (28.99, 17.5), top at y=10
    R=10 → endpoints (7.34, 20)    and (24.66, 20),   top at y=15
    R=5  → endpoints (11.67, 22.5) and (20.33, 22.5), top at y=20
  -->

  <!-- Large arc -->
  <path d="M 3,17.5 A 15,15 0 0,1 29,17.5"
        fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Medium arc -->
  <path d="M 7.3,20 A 10,10 0 0,1 24.7,20"
        fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Small arc -->
  <path d="M 11.7,22.5 A 5,5 0 0,1 20.3,22.5"
        fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="16" cy="25" r="2.5" fill="white"/>
</svg>
